<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Number Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⏰</text></svg>">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="history-panel" id="historyPanel">
            <div class="history-header">
                <h2>History</h2>
                <span class="history-subtitle">Log of generated numbers</span>
            </div>
            <div class="history-list" id="historyList">
                <!-- History items will be injected here -->
                <div class="empty-state">No numbers generated yet.</div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <button id="sidebarToggle" class="sidebar-toggle" aria-label="Toggle Sidebar">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M4 6H20M4 12H20M4 18H20" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                        stroke-linejoin="round" />
                </svg>
            </button>
            <div class="generator-container">
                <div class="number-display" id="numberDisplay">00000</div>
                <div class="status-indicator" id="timerDisplay">Waiting to start...</div>
                <div class="settings-container">
                    <div class="setting-group">
                        <label for="minInput">Min</label>
                        <input type="number" id="minInput" value="0">
                    </div>
                    <div class="setting-group">
                        <label for="maxInput">Max</label>
                        <input type="number" id="maxInput" value="100000">
                    </div>
                    <div class="setting-group">
                        <label for="intervalInput">Interval (min)</label>
                        <input type="number" id="intervalInput" value="15" min="0.1" step="0.1">
                    </div>
                </div>
                <button id="startButton" class="start-btn">START</button>
            </div>
        </main>
    </div>
    <script src="script.js"></script>
</body>

</html>
